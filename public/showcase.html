<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassIntel AI — Project Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060610;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
    }

    /* ── Background orbs ── */
    .bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.18;
    }
    .orb-1 { width: 600px; height: 600px; background: #7c3aed; top: -200px; left: -200px; }
    .orb-2 { width: 500px; height: 500px; background: #0891b2; bottom: -150px; right: -150px; }
    .orb-3 { width: 400px; height: 400px; background: #4f46e5; top: 50%; left: 50%; transform: translate(-50%,-50%); }

    /* ── Layout ── */
    .wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 900px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
      color: #a78bfa; background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.25);
      padding: 5px 14px; border-radius: 100px; margin-bottom: 20px;
    }
    header h1 {
      font-size: 2.6rem; font-weight: 800; line-height: 1.1;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 60%, #06b6d4 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    header p { color: #94a3b8; font-size: 1rem; }

    /* ── Main viewer ── */
    .main-viewer {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
      box-shadow: 0 0 80px rgba(139,92,246,0.12), 0 32px 64px rgba(0,0,0,0.5);
      margin-bottom: 16px;
      cursor: zoom-in;
    }
    .main-viewer img {
      width: 100%; height: auto;
      display: block;
      transition: transform 0.35s ease;
    }
    .main-viewer:hover img { transform: scale(1.01); }

    /* Caption bar */
    .caption {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      margin-bottom: 32px;
    }
    .caption-text {
      font-size: 0.95rem; color: #94a3b8; font-style: italic;
    }
    .counter {
      font-size: 0.8rem; color: #4b5563; font-weight: 600; letter-spacing: 0.06em;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      margin-bottom: 28px;
    }

    /* ── Thumbnail grid ── */
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .thumb-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .thumb-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      border-color: rgba(139,92,246,0.4);
    }
    .thumb-card.active {
      border-color: #a78bfa;
      box-shadow: 0 0 0 1px #a78bfa, 0 12px 32px rgba(139,92,246,0.25);
    }

    .thumb-card img {
      width: 100%; height: auto; display: block;
      transition: opacity 0.2s;
    }
    .thumb-card:not(.active) img { opacity: 0.65; }
    .thumb-card:not(.active):hover img { opacity: 0.9; }

    .thumb-label {
      padding: 8px 10px 10px;
      font-size: 0.72rem; font-weight: 600; text-align: center;
      color: #94a3b8;
      transition: color 0.2s;
      line-height: 1.3;
    }
    .thumb-card.active .thumb-label { color: #e2e8f0; }

    /* ── Nav arrows ── */
    .nav-arrows {
      display: flex; justify-content: center; gap: 12px;
      margin-top: 28px;
    }
    .arrow-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #94a3b8; font-size: 0.85rem; font-family: 'Outfit', sans-serif; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .arrow-btn:hover:not(:disabled) {
      background: rgba(139,92,246,0.15);
      border-color: rgba(139,92,246,0.4);
      color: #e2e8f0;
    }
    .arrow-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Back link ── */
    .back-link {
      position: fixed; top: 22px; left: 24px; z-index: 10;
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 0.82rem; font-weight: 600; color: #94a3b8;
      text-decoration: none; font-family: 'Outfit', sans-serif;
      transition: color 0.2s;
    }
    .back-link:hover { color: #e2e8f0; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header h1 { font-size: 1.8rem; }
      .thumb-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <a href="/" class="back-link">
    ← Back to App
  </a>

  <div class="wrapper">

    <header>
      <div class="badge">🛡️ PassIntel AI</div>
      <h1>Project Showcase</h1>
      <p>Click any thumbnail to preview the screen in full detail.</p>
    </header>

    <!-- Main Viewer -->
    <div class="main-viewer" id="mainViewer" onclick="openFullscreen()">
      <img id="mainImg" src="01.png" alt="Main Screenshot" />
    </div>

    <!-- Caption -->
    <div class="caption">
      <span class="caption-text" id="mainCaption">The AI-Powered Security Intelligence landing page with mode selection and live stats strip.</span>
      <span class="counter" id="counter">01 / 04</span>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Thumbnail Grid -->
    <div class="thumb-grid" id="thumbGrid">
      <!-- Populated by JS -->
    </div>

    <!-- Nav Arrows -->
    <div class="nav-arrows">
      <button class="arrow-btn" id="prevBtn" onclick="navigate(-1)">&#8592; Previous</button>
      <button class="arrow-btn" id="nextBtn" onclick="navigate(1)">Next &#8594;</button>
    </div>

  </div>

  <script>
    const screens = [
      {
        src: '01.png',
        label: 'Landing & Hero',
        caption: 'The AI-Powered Security Intelligence landing page with mode selection and live stats strip.',
      },
      {
        src: '02.png',
        label: 'Analyzer + Heatmap',
        caption: 'Character-by-character predictability heatmap, Shannon Entropy ring, security metrics, and AI-hardened variant suggestions.',
      },
      {
        src: '03.png',
        label: 'AI Generator',
        caption: 'The AI Generator tab showing mode selection, temperature controls, and password generation interface.',
      },
      {
        src: '04.png',
        label: 'Generator Output',
        caption: 'Temperature-scaled generation results with entropy score, crack-time estimate, and the "How It Works" step cards.',
      },
    ];

    let current = 0;

    function renderThumbs() {
      const grid = document.getElementById('thumbGrid');
      grid.innerHTML = screens.map((s, i) => `
        <div class="thumb-card ${i === current ? 'active' : ''}" onclick="select(${i})">
          <img src="${s.src}" alt="${s.label}" loading="lazy" />
          <div class="thumb-label">${s.label}</div>
        </div>
      `).join('');
    }

    function updateMain() {
      const s = screens[current];
      const img = document.getElementById('mainImg');
      img.style.opacity = 0;
      img.style.transition = 'opacity 0.18s ease';
      setTimeout(() => {
        img.src = s.src;
        img.alt = s.label;
        img.onload = () => { img.style.opacity = 1; };
        // Fallback in case image is already cached
        if (img.complete) img.style.opacity = 1;
      }, 180);

      document.getElementById('mainCaption').textContent = s.caption;
      document.getElementById('counter').textContent =
        String(current + 1).padStart(2, '0') + ' / ' + String(screens.length).padStart(2, '0');

      document.getElementById('prevBtn').disabled = current === 0;
      document.getElementById('nextBtn').disabled = current === screens.length - 1;
    }

    function select(i) {
      current = i;
      renderThumbs();
      updateMain();
    }

    function navigate(dir) {
      const next = current + dir;
      if (next < 0 || next >= screens.length) return;
      select(next);
    }

    function openFullscreen() {
      window.open(screens[current].src, '_blank');
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    // Init
    renderThumbs();
    updateMain();
  </script>

</body>
</html>
